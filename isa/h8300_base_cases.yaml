schema: 1
profile: h8300_base
fetch_word_bits: 16
storage_word_bits: 18
byte_order: big
ccr_order: HNZVC
decode_key_bits_max: 4
retire_compare:
  - pc
  - regs
  - ccr_hnzvc
  - trap
  - memory
retire_trace:
  schema: 1
  record: h8_retire
  compare_fields:
    - pc
    - regs
    - ccr_hnzvc
    - trap
    - memory
  fields:
    - name: valid
      kind: bool
      source: retire.valid
      required: true
    - name: start_pc
      kind: bits
      bits: 16
      source: state.pc.before
      required: true
    - name: pc
      kind: bits
      bits: 16
      source: state.pc.after
      required: true
    - name: instruction_id
      kind: enum
      source: case.instruction
      required: true
    - name: trap
      kind: bool
      source: execute.trap
      required: true
    - name: ccr_hnzvc
      kind: bits
      bits: 5
      source: state.ccr.after
      required: true
    - name: gpr_write_count
      kind: uint
      bits: 2
      source: writeback.count
      required: true
    - name: gpr_write0_name
      kind: enum
      source: writeback.reg0.name
      required: false
    - name: gpr_write0_value
      kind: bits
      bits: 16
      source: writeback.reg0.value
      required: false
    - name: gpr_write1_name
      kind: enum
      source: writeback.reg1.name
      required: false
    - name: gpr_write1_value
      kind: bits
      bits: 16
      source: writeback.reg1.value
      required: false
    - name: mem_access_count
      kind: uint
      bits: 2
      source: memory.count
      required: true
    - name: mem0_kind
      kind: enum
      source: memory.access0.kind
      required: false
    - name: mem0_addr
      kind: bits
      bits: 16
      source: memory.access0.addr
      required: false
    - name: mem0_wmask
      kind: bits
      bits: 2
      source: memory.access0.wmask
      required: false
    - name: mem0_wdata
      kind: bits
      bits: 16
      source: memory.access0.wdata
      required: false
    - name: mem0_rdata
      kind: bits
      bits: 16
      source: memory.access0.rdata
      required: false
    - name: mem1_kind
      kind: enum
      source: memory.access1.kind
      required: false
    - name: mem1_addr
      kind: bits
      bits: 16
      source: memory.access1.addr
      required: false
    - name: mem1_wmask
      kind: bits
      bits: 2
      source: memory.access1.wmask
      required: false
    - name: mem1_wdata
      kind: bits
      bits: 16
      source: memory.access1.wdata
      required: false
    - name: mem1_rdata
      kind: bits
      bits: 16
      source: memory.access1.rdata
      required: false
audits:
  chip:
    - decode keys are one nibble each
    - expected state is architectural
    - fetch storage width is a multiple of 9
  psychology:
    - each case has one canonical id
    - case names match instruction Sail names
    - assembler spelling is not the case owner
    - failures map to one check area
instructions:
  - id: h8_nop
    assembler_template: nop
    length_bytes: 2
    encoding:
      mask: "0xffff"
      match: "0x0000"
      fields: {}
    sail:
      decode: H8_NOP
      execute: h8_exec_nop
    effects: [pc]

  - id: h8_sleep
    assembler_template: sleep
    length_bytes: 2
    encoding:
      mask: "0xffff"
      match: "0x0180"
      fields: {}
    sail:
      decode: H8_SLEEP
      execute: h8_exec_sleep
    effects: [pc]

  - id: h8_stc_ccr_r8
    assembler_template: "stc ccr, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xfff0"
      match: "0x0200"
      fields:
        rd8: "word[3:0]"
    sail:
      decode: H8_STC_CCR_R8
      execute: h8_exec_stc_ccr
    effects: [pc, rd8]

  - id: h8_ldc_r8_ccr
