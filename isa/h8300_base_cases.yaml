      ccr_hnzvc: "11001"
      trap: false
    memory:
      initial:
        "0x0140": "0x80"
      expected:
        "0x0140": "0x80"
      access:
        kind: read
        width: byte
        addr: "0x0140"
        wmask: "00"
        rdata: "0x0080"

