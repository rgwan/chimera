schema: 1
profile: h8300_base
fetch_word_bits: 16
storage_word_bits: 18
byte_order: big
ccr_order: HNZVC
decode_key_bits_max: 4
retire_compare:
  - pc
  - regs
  - ccr_hnzvc
  - trap
audits:
  chip:
    - decode keys are one nibble each
    - expected state is architectural
    - fetch storage width is a multiple of 9
  psychology:
    - each case has one canonical id
    - case names match instruction Sail names
    - assembler spelling is not the case owner
    - failures map to one check area
instructions:
  - id: h8_nop
    assembler_template: nop
    length_bytes: 2
    encoding:
      mask: "0xffff"
      match: "0x0000"
      fields: {}
    sail:
      decode: H8_NOP
      execute: h8_exec_nop
    effects: [pc]

  - id: h8_mov8_imm_r8
    assembler_template: "mov.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xf000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_MOV8_IMM
      execute: h8_exec_mov8_imm
    effects: [pc, rd8, ccr_nzv]

  - id: h8_mov16_imm_r16
    assembler_template: "mov.w #{imm16}, {rd16}"
    length_bytes: 4
    encoding:
      mask: "0xfff8"
      match: "0x7900"
      fields:
        rd16: "word[2:0]"
        imm16: "ext[15:0]"
    sail:
      decode: H8_MOV16_IMM
      execute: h8_exec_mov16_imm
    effects: [pc, rd16, ccr_nzv]

  - id: h8_add8_imm_r8
    assembler_template: "add.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0x8000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_ADD8_IMM
      execute: h8_exec_add8
    effects: [pc, rd8, ccr_hnzvc]

  - id: h8_cmp8_imm_r8
    assembler_template: "cmp.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xa000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_CMP8_IMM
      execute: h8_exec_cmp8
    effects: [pc, ccr_hnzvc]

  - id: h8_add8_r8_r8
    assembler_template: "add.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x0800"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_ADD8_R8_R8
      execute: h8_exec_add8
    effects: [pc, rd8, ccr_hnzvc]

  - id: h8_mov8_r8_r8
    assembler_template: "mov.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x0c00"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_MOV8_R8_R8
      execute: h8_exec_mov8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_or8_imm_r8
    assembler_template: "or.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xc000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_OR8_IMM
      execute: h8_exec_or8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_or8_r8_r8
    assembler_template: "or.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1400"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_OR8_R8_R8
      execute: h8_exec_or8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_xor8_imm_r8
    assembler_template: "xor.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xd000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_XOR8_IMM
      execute: h8_exec_xor8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_xor8_r8_r8
    assembler_template: "xor.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1500"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_XOR8_R8_R8
      execute: h8_exec_xor8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_and8_imm_r8
    assembler_template: "and.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xe000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_AND8_IMM
      execute: h8_exec_and8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_and8_r8_r8
    assembler_template: "and.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1600"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_AND8_R8_R8
      execute: h8_exec_and8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_sub8_r8_r8
    assembler_template: "sub.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1800"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_SUB8_R8_R8
      execute: h8_exec_sub8
    effects: [pc, rd8, ccr_hnzvc]

  - id: h8_cmp8_r8_r8
    assembler_template: "cmp.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1c00"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_CMP8_R8_R8
      execute: h8_exec_cmp8
    effects: [pc, ccr_hnzvc]

  - id: h8_bne_rel8
    assembler_template: bne {rel8}
    length_bytes: 2
    encoding:
      mask: "0xff01"
      match: "0x4600"
      guard: disp8_bit0_zero
      fields:
        rel8: "word[7:0]"
    sail:
      decode: H8_BRANCH
      execute: h8_exec_branch
    effects: [pc, branch]
cases:
  - id: h8_nop
    instruction: h8_nop
    status: supported
    check_area: execute
    assembler:
      - nop
    words:
      - "0x0000"
    decode_keys: ["0", "0", "0", "0"]
    sail:
      decode: H8_NOP
      execute: h8_exec_nop
    initial:
      pc: "0x0000"
      regs: {}
      ccr_hnzvc: "00000"
    expected:
      pc: "0x0002"
      regs: {}
      ccr_hnzvc: preserve
      trap: false

