name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # zaozi pins a from-source CIRCT/LLVM/MLIR (no public binary cache), so a
      # cold runner spends hours compiling the toolchain. Persist /nix/store
      # across runs: the first release builds and caches it, later runs restore.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # One synthesizable tarball per config. FPGA tiers infer a block-RAM ROM
      # and ship urom.memh (its readmemh path is rewritten tarball-relative);
      # ASIC tiers synthesize the ROM to gates. DV trace collateral is dropped.
      - name: Build and package RTL for every config
        run: |
          set -euo pipefail
          for cfg in fpga-lean fpga-pipe fpga-strict asic-lean asic-pipe asic-strict \
                     fpga-pipe-axi asic-pipe-axi fpga-soc asic-soc; do
            nix build ".#rtl-$cfg" --option sandbox false -o "out-$cfg"
            stage="stage-$cfg"
            mkdir -p "$stage"
            for f in out-$cfg/*.sv; do
              case "$(basename "$f")" in
                layers-*|ref_*) ;;
                *) cp "$f" "$stage/" ;;
              esac
            done
            if [ -f "out-$cfg/urom.memh" ]; then
              cp "out-$cfg/urom.memh" "$stage/"
              sed -i 's|\.\./generated/urom.memh|urom.memh|' "$stage/MicrocodeRom.sv"
            fi
            # AXI-Lite configs expose axil_* ports; ship the canonical-name
            # m_axil_* wrapper so the core drops straight onto standard AXI IP.
            case "$cfg" in
              *-axi|*-soc) cp test/cocotb/wrappers/coretop_axil.sv "$stage/" ;;
            esac
            ( cd "$stage" && ls *.sv > filelist.f )
            tar czf "chimera-$cfg.tar.gz" -C "$stage" .
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            chimera-fpga-lean.tar.gz \
            chimera-fpga-pipe.tar.gz \
            chimera-fpga-strict.tar.gz \
            chimera-asic-lean.tar.gz \
            chimera-asic-pipe.tar.gz \
            chimera-asic-strict.tar.gz \
            chimera-fpga-pipe-axi.tar.gz \
            chimera-asic-pipe-axi.tar.gz \
            chimera-fpga-soc.tar.gz \
            chimera-asic-soc.tar.gz \
            --title "Chimera ${{ github.ref_name }}" \
            --notes "FPGA-first H8/300 CPU core: hybrid-microcode, multi-cycle, verified against a Sail model. Synthesizable RTL built in CI by nix; one tarball per config (production SystemVerilog, no DV collateral).

          | Download | Platform | ROM | Tier | Bus | Debug |
          |---|---|---|---|---|---|
          | chimera-fpga-lean.tar.gz | FPGA | block RAM | single-cycle, smallest | simple | - |
          | chimera-fpga-pipe.tar.gz | FPGA | block RAM | pipelined, highest clock | simple | - |
          | chimera-fpga-strict.tar.gz | FPGA | block RAM | illegal-encoding guards | simple | - |
          | chimera-asic-lean.tar.gz | ASIC | gates | single-cycle, smallest | simple | - |
          | chimera-asic-pipe.tar.gz | ASIC | gates | pipelined, highest clock | simple | - |
          | chimera-asic-strict.tar.gz | ASIC | gates | illegal-encoding guards | simple | - |
          | chimera-fpga-pipe-axi.tar.gz | FPGA | block RAM | pipelined | AXI-Lite | - |
          | chimera-asic-pipe-axi.tar.gz | ASIC | gates | pipelined | AXI-Lite | - |
          | chimera-fpga-soc.tar.gz | FPGA | block RAM | pipelined | AXI-Lite | JTAG DM |
          | chimera-asic-soc.tar.gz | ASIC | gates | pipelined | AXI-Lite | JTAG DM |

          FPGA tarballs include urom.memh (readmemh path is tarball-relative); ASIC tarballs carry filelist.f. AXI-Lite tarballs (-axi bare core, -soc with JTAG debug) add coretop_axil.sv exposing canonical m_axil_* ports. See README for area, frequency, power, and benchmark numbers."
