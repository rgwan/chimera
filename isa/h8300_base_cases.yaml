  - id: h8_xor8_imm_r8
    assembler_template: "xor.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xd000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_XOR8_IMM
      execute: h8_exec_xor8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_xor8_r8_r8
    assembler_template: "xor.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x1500"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_XOR8_R8_R8
      execute: h8_exec_xor8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_and8_imm_r8
    assembler_template: "and.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xe000"
      fields:
        rd8: "word[11:8]"
