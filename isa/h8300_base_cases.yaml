    effects: [pc, ccr_hnzvc]

  - id: h8_branch_rel8
    assembler_template: "{cond} {rel8}"
    length_bytes: 2
    encoding:
      mask: "0xf001"
      match: "0x4000"
      guard: disp8_bit0_zero
      fields:
        cond: "word[11:8]"
        rel8: "word[7:0]"
    sail:
      decode: H8_BRANCH
      execute: h8_exec_branch
    effects: [pc, branch]
cases:
  - id: h8_nop
    instruction: h8_nop
    status: supported
    check_area: execute
    assembler:
      - nop
    words:
      - "0x0000"
    decode_keys: ["0", "0", "0", "0"]
    sail:
      decode: H8_NOP
      execute: h8_exec_nop
    initial:
      pc: "0x0000"
      regs: {}
      ccr_hnzvc: "00000"
    expected:
      pc: "0x0002"
      regs: {}
      ccr_hnzvc: preserve
      trap: false

  - id: h8_mov8_imm_r0h
