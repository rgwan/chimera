name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # zaozi pins a from-source CIRCT/LLVM/MLIR (no public binary cache), so a
      # cold runner spends hours compiling the toolchain. Persist /nix/store
      # across runs: the first release builds and caches it, later runs restore.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Synthesizable RTL sets: the default single-cycle FPGA config and the
      # optional pipelined variant. No DV trace collateral.
      - name: Build RTL
        run: |
          nix build .#rtl-fpga --option sandbox false -o result-rtl
          nix build .#rtl-fpga-pipe --option sandbox false -o result-rtl-pipe
          tar czf chimera-rtl-fpga.tar.gz -C result-rtl .
          tar czf chimera-rtl-fpga-pipe.tar.gz -C result-rtl-pipe .

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            chimera-rtl-fpga.tar.gz \
            chimera-rtl-fpga-pipe.tar.gz \
            --title "Chimera ${{ github.ref_name }}" \
            --notes "FPGA-first H8/300 CPU core: hybrid-microcode, multi-cycle, verified against a Sail model. Synthesizable RTL built in CI by nix. rtl-fpga is the default single-cycle core; rtl-fpga-pipe is the optional two-stage microword pipeline. See README for area, frequency, power, and benchmark numbers."
