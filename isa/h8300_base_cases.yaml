schema: 1
profile: h8300_base
fetch_word_bits: 16
storage_word_bits: 18
byte_order: big
ccr_order: HNZVC
decode_key_bits_max: 4
retire_compare:
  - pc
  - regs
  - ccr_hnzvc
  - trap
  - memory
retire_trace:
  schema: 1
  record: h8_retire
  compare_fields:
    - pc
    - regs
    - ccr_hnzvc
    - trap
    - memory
  fields:
    - name: valid
      kind: bool
      source: retire.valid
      required: true
    - name: start_pc
      kind: bits
      bits: 16
      source: state.pc.before
      required: true
    - name: pc
      kind: bits
      bits: 16
      source: state.pc.after
      required: true
    - name: instruction_id
      kind: enum
      source: case.instruction
      required: true
    - name: trap
      kind: bool
      source: execute.trap
      required: true
    - name: ccr_hnzvc
      kind: bits
      bits: 5
      source: state.ccr.after
      required: true
    - name: gpr_write_count
      kind: uint
      bits: 2
      source: writeback.count
      required: true
    - name: gpr_write0_name
      kind: enum
      source: writeback.reg0.name
      required: false
    - name: gpr_write0_value
      kind: bits
      bits: 16
      source: writeback.reg0.value
      required: false
    - name: mem_access_count
      kind: uint
      bits: 2
      source: memory.count
      required: true
    - name: mem0_kind
      kind: enum
      source: memory.access0.kind
      required: false
    - name: mem0_addr
      kind: bits
      bits: 16
      source: memory.access0.addr
      required: false
    - name: mem0_wmask
      kind: bits
      bits: 2
      source: memory.access0.wmask
      required: false
    - name: mem0_wdata
      kind: bits
      bits: 16
      source: memory.access0.wdata
      required: false
    - name: mem0_rdata
      kind: bits
      bits: 16
      source: memory.access0.rdata
      required: false
audits:
  chip:
    - decode keys are one nibble each
    - expected state is architectural
    - fetch storage width is a multiple of 9
  psychology:
    - each case has one canonical id
    - case names match instruction Sail names
    - assembler spelling is not the case owner
    - failures map to one check area
instructions:
  - id: h8_nop
    assembler_template: nop
    length_bytes: 2
    encoding:
      mask: "0xffff"
      match: "0x0000"
      fields: {}
    sail:
      decode: H8_NOP
      execute: h8_exec_nop
    effects: [pc]

  - id: h8_mov8_imm_r8
    assembler_template: "mov.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xf000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_MOV8_IMM
      execute: h8_exec_mov8_imm
    effects: [pc, rd8, ccr_nzv]

  - id: h8_mov16_imm_r16
    assembler_template: "mov.w #{imm16}, {rd16}"
    length_bytes: 4
    encoding:
      mask: "0xfff8"
      match: "0x7900"
      fields:
        rd16: "word[2:0]"
        imm16: "ext[15:0]"
    sail:
      decode: H8_MOV16_IMM
      execute: h8_exec_mov16_imm
    effects: [pc, rd16, ccr_nzv]

  - id: h8_add8_imm_r8
    assembler_template: "add.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0x8000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_ADD8_IMM
      execute: h8_exec_add8
    effects: [pc, rd8, ccr_hnzvc]

  - id: h8_cmp8_imm_r8
    assembler_template: "cmp.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xa000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_CMP8_IMM
      execute: h8_exec_cmp8
    effects: [pc, ccr_hnzvc]

  - id: h8_add8_r8_r8
    assembler_template: "add.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x0800"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_ADD8_R8_R8
      execute: h8_exec_add8
    effects: [pc, rd8, ccr_hnzvc]

  - id: h8_add16_r16_r16
    assembler_template: "add.w {rs16}, {rd16}"
    length_bytes: 2
    encoding:
      mask: "0xff88"
      match: "0x0900"
      fields:
        rs16: "word[6:4]"
        rd16: "word[2:0]"
    sail:
      decode: H8_ADD16_R16_R16
      execute: h8_exec_add16
    effects: [pc, rd16, ccr_hnzvc]

  - id: h8_mov8_r8_r8
    assembler_template: "mov.b {rs8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff00"
      match: "0x0c00"
      fields:
        rs8: "word[7:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_MOV8_R8_R8
      execute: h8_exec_mov8
    effects: [pc, rd8, ccr_nzv]

  - id: h8_mov16_r16_r16
    assembler_template: "mov.w {rs16}, {rd16}"
    length_bytes: 2
    encoding:
      mask: "0xff88"
      match: "0x0d00"
      fields:
        rs16: "word[6:4]"
        rd16: "word[2:0]"
    sail:
      decode: H8_MOV16_R16_R16
      execute: h8_exec_mov16
    effects: [pc, rd16, ccr_nzv]

  - id: h8_mov8_r16i_r8
    assembler_template: "mov.b @{rs16}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xff80"
      match: "0x6800"
      fields:
        rs16: "word[6:4]"
        rd8: "word[3:0]"
    sail:
      decode: H8_MOV8_R16I_R8
      execute: h8_exec_mov8_mem_to_reg
    effects: [pc, rd8, ccr_nzv, mem_read]

  - id: h8_mov8_r8_r16i
    assembler_template: "mov.b {rs8}, @{rd16}"
    length_bytes: 2
    encoding:
      mask: "0xff80"
      match: "0x6880"
      fields:
        rd16: "word[6:4]"
        rs8: "word[3:0]"
    sail:
      decode: H8_MOV8_R8_R16I
      execute: h8_exec_mov8_reg_to_mem
    effects: [pc, ccr_nzv, mem_write]

  - id: h8_or8_imm_r8
    assembler_template: "or.b #{imm8}, {rd8}"
    length_bytes: 2
    encoding:
      mask: "0xf000"
      match: "0xc000"
      fields:
        rd8: "word[11:8]"
        imm8: "word[7:0]"
    sail:
      decode: H8_OR8_IMM
      execute: h8_exec_or8
